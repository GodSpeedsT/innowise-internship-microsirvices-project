databaseChangeLog:
  - changeSet:
      id: 1
      author: Kirill
      preConditions:
        - onFail: WARN
        - not:
            - tableExists:
                tableName: users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: surname
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(100)
                  constraints:
                    nullable: true
                    unique: true
              - column:
                  name: birth_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
  - changeSet:
      id: 2
      author: Kirill
      preConditions:
        - onFail: WARN
        - not:
            - tableExists:
                tableName: payment_cards
      changes:
        - createTable:
            tableName: payment_cards
            columns:
              - column:
                  name: card_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    unique: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_payment_card_user
                    referencedTableName: users
                    referencedColumnNames: user_id
                    nullable: false
              - column:
                  name: card_number
                  type: varchar(19)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: holder
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: expiration_date
                  type: varchar(7)
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: 3
      author: Kirill
      changes:
        - createIndex:
            tableName: users
            indexName: idx_user_email
            columns:
              - column:
                  name: email
        - createIndex:
            tableName: users
            indexName: idx_user_username
            columns:
              - column:
                  name: username
        - createIndex:
            tableName: payment_cards
            indexName: idx_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: payment_cards
            indexName: idx_card_number
            columns:
              - column:
                  name: card_number
