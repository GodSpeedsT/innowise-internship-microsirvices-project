spring:
  datasource:
    url: jdbc:postgresql://auth_db:5432/${AUTH_DB_DATABASE:secret}
    username: ${AUTH_DB_USERNAME:secret}
    password: ${AUTH_DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:/db/changelog/changelog-root.yaml
jwt:
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

user-service:
  url: http://user-service:8081

server:
  port: 8085
