spring:
  application:
    name: auth-service
  datasource:
      url: jdbc:postgresql://localhost:5433/${AUTH_DB_DATABASE:secret}
      username: ${AUTH_DB_USERNAME:secret}
      password: ${AUTH_DB_PASSWORD:secret}
      driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:/db/changelog/changelog-root.yaml

jwt:
  secret: "4f7V9xP2wL3kQ8mN5jC1bZ6vY4rX7tH0gD9sF3aC8nL2kM1pW4xV7bN9mZ3lK6jH"
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

server:
  port: 8085
