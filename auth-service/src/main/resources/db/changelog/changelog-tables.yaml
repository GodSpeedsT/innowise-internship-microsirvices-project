databaseChangeLog:
  - changeSet:
      id: 1
      author: Kirill
      preConditions:
        - onFail: WARN
        - not:
            - tableExists:
                tableName: auth_users
      changes:
        - createTable:
            tableName: auth_users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: login
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false