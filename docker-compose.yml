services:
  users_db:
    container_name: users_db
    image: postgres:latest
    environment:
      POSTGRES_USER: ${USER_DB_USERNAME}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
      POSTGRES_DB: ${USERS_DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - users_data:/var/lib/postgresql
    networks:
      - innowise_network

  auth_db:
    container_name: auth_db
    image: postgres:latest
    environment:
      POSTGRES_USER: ${AUTH_DB_USERNAME}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_DATABASE}
    ports:
      - "5433:5432"
    volumes:
      - auth_data:/var/lib/postgresql
    networks:
      - innowise_network

  order_db:
    container_name: order_db
    image: postgres:latest
    environment:
      POSTGRES_USER: ${ORDER_DB_USERNAME}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
      POSTGRES_DB: ${ORDER_DB_DATABASE}
    ports:
      - "5434:5432"
    volumes:
      - order_data:/var/lib/postgresql
    networks:
      - innowise_network

  users_redis:
    container_name: users_redis
    image: redis:latest
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_DATABASE: ${REDIS_DATABASE}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - innowise_network


volumes:
  users_data:
  auth_data:
  order_data:
  redis_data:


networks:
  innowise_network:
    driver: bridge