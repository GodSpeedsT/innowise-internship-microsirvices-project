services:
  user-service:
    container_name: user_service
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      USERS_DB_HOST: localhost
      USERS_DB_DATABASE: user_db
      USERS_DB_USERNAME: postgres
      USERS_DB_PASSWORD: postgres
      REDIS_HOST: users_redis
      REDIS_DATABASE: 0
    depends_on:
      - users_db
      - users_redis
    networks:
      - innowise_network

  users_db:
    container_name: users_db
    image: postgres:latest
    environment:
      POSTGRES_USER: ${USERS_DB_USERNAME}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
      POSTGRES_DB: ${USERS_DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - users_data:/var/lib/postgresql
    networks:
      - innowise_network

  users_redis:
    container_name: users_redis
    image: redis:latest
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_DATABASE: ${REDIS_DATABASE}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - innowise_network

  order-service:
    container_name: order-service
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ORDERS_DB_DATABASE: orders
      ORDERS_DB_USERNAME: orders
      ORDERS_DB_PASSWORD: orders
    depends_on:
      - order_db
    networks:
      - innowise_network

  order_db:
    container_name: order_db
    image: postgres:latest
    environment:
      POSTGRES_USER: ${ORDERS_DB_USERNAME}
      POSTGRES_PASSWORD: ${ORDERS_DB_PASSWORD}
      POSTGRES_DB: ${ORDERS_DB_DATABASE}
    ports:
      - "5434:5432"
    volumes:
      - order_data:/var/lib/postgresql
    networks:
      - innowise_network

  auth-service:
    container_name: auth_service
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      AUTH_DB_DATABASE: secret
      AUTH_DB_USERNAME: secret
      AUTH_DB_PASSWORD: secret
    depends_on:
      - auth_db
    networks:
      - innowise_network

  auth_db:
    container_name: auth_db
    image: postgres:latest
    environment:
      POSTGRES_USER: ${AUTH_DB_USERNAME}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_DATABASE}
    ports:
      - "5433:5432"
    volumes:
      - auth_data:/var/lib/postgresql
    networks:
      - innowise_network

  kafka:
    container_name: kafka
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    networks:
      - innowise_network

volumes:
  users_data:
  auth_data:
  order_data:
  redis_data:

networks:
  innowise_network:
    driver: bridge