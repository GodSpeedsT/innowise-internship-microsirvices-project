spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://${USER_SERVICE_HOST:user-service}:${USER_SERVICE_PORT:8081}
              predicates:
                - Path=/api/v1/users/**
            - id: order-service
              uri: http://${ORDER_SERVICE_HOST:order-service}:${ORDER_SERVICE_PORT:8082}
              predicates:
                - Path=/api/v1/orders/**, /api/v1/items/**
            - id: auth-service
              uri: http://${AUTH_SERVICE_HOST:auth-service}:${AUTH_SERVICE_PORT:8085}
              predicates:
                - Path=/api/v1/auth/**
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${AUTH_SERVICE_HOST:auth-service}:${AUTH_SERVICE_PORT:8085}/api/v1/auth/jwks.json
server:
  port: 8080
logging:
  level:
    root: info
    org.springframework.cloud.gateway: info
